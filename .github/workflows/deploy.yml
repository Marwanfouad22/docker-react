name: run the test autoetzcatty
on:
  push:
    branches :
      - master
jobs :
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t marwaan22/react-test -f Dockerfile.dev .
      - run: docker run -e CI=true marwaan22/react-test npm run test
  

